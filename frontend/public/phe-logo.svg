<svg viewBox="0 0 600 560" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- 1: Langer Stab links (höchster nach unten) -->
  <rect x="50" y="157" width="36" height="363" rx="18" fill="#3b7dc3"/>

  <!-- 2: Rundes Ende OBEN, Haken UNTEN rechts -->
  <path d="M 116 154 L 116 363 Q 116 385 136 385 L 183 385"
        stroke="#3b7dc3" stroke-width="36" stroke-linecap="round"/>

  <!-- 3: Mittlerer Stab (höchster nach oben) -->
  <rect x="209" y="35" width="36" height="366" rx="18" fill="#3b7dc3"/>

  <!-- 4: Haken OBEN rechts, rundes Ende UNTEN -->
  <path d="M 310 401 L 310 180 Q 310 160 330 160 L 378 160"
        stroke="#3b7dc3" stroke-width="36" stroke-linecap="round"/>

  <!-- 5–7: Drei horizontale Pills -->
  <rect x="401" y="174" width="154" height="36" rx="18" fill="#3b7dc3"/>
  <rect x="401" y="264" width="154" height="36" rx="18" fill="#3b7dc3"/>
  <rect x="401" y="353" width="154" height="36" rx="18" fill="#3b7dc3"/>
</svg>

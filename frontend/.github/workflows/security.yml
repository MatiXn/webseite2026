name: Security Scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Jeden Montag 08:00 UTC — wöchentliches Dependency-Audit
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  # ── npm audit ────────────────────────────────────────────────────────────────
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: npm audit (high + critical only)
        working-directory: frontend
        run: npm audit --audit-level=high --json > audit-report.json || true

      - name: Fail on critical vulnerabilities
        working-directory: frontend
        run: |
          CRITICAL=$(cat audit-report.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          meta = data.get('metadata', {}).get('vulnerabilities', {})
          print(meta.get('critical', 0))
          ")
          echo "Critical vulnerabilities: $CRITICAL"
          if [ "$CRITICAL" -gt "0" ]; then
            echo "❌ Critical vulnerabilities found — build blocked"
            cat audit-report.json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          vulns = data.get('vulnerabilities', {})
          for name, v in vulns.items():
              if v.get('severity') in ('critical', 'high'):
                  print(f\"  [{v['severity'].upper()}] {name}: {v.get('title', 'N/A')}\")
            "
            exit 1
          fi
          echo "✅ No critical vulnerabilities"

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: frontend/audit-report.json
          retention-days: 30

  # ── CodeQL (SAST) ─────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL SAST
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  # ── Dependency Review (nur bei PRs) ──────────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

  # ── Secrets Scanning (Gitleaks) ───────────────────────────────────────────────
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Vollständige History für Leak-Erkennung

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── TypeScript Type Check ─────────────────────────────────────────────────────
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

  # ── Next.js Build ─────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [npm-audit, typecheck]
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_key_for_build
      NEXT_PUBLIC_API_URL: https://api.phe-perm.de
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --prefer-offline

      - name: Build
        working-directory: frontend
        run: npm run build
